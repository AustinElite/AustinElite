name: Generate Snake

on:
  workflow_dispatch:

permissions:
  contents: write  # 核心：Action可以写仓库

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: AustinElite
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Deploy to output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
          clean: true
