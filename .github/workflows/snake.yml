name: Generate Contribution Snake

on:
  workflow_dispatch:   # 支持手动运行
  schedule:            # 每天运行一次
    - cron: "0 0 * * *"
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1️⃣ 设置 Node.js 24 环境变量
      - name: Force Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      # 2️⃣ Checkout 仓库（保证空仓库也能运行）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 3️⃣ 确保 output 分支存在
      - name: Ensure output branch exists
        run: |
          git fetch origin output || git checkout --orphan output
          git checkout output
          git commit --allow-empty -m "init output branch" || echo "branch exists"

      # 4️⃣ 生成 Snake SVG
      - name: Generate GitHub Contribution Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5️⃣ 推送生成文件到 output 分支
      - name: Deploy to output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
          clean: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
